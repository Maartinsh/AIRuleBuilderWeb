<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Engine — Published Rules</title>
  <style>
    :root {
      --bg: #1a1c23; --surface: #23262f; --surface-alt: #2a2d37;
      --border: #363944; --text: #e2e4e9; --text-muted: #9ca3b0;
      --primary: #3b82f6; --success: #22c55e; --error: #ef4444;
      --warning: #f59e0b; --mono: 'SF Mono', 'Fira Code', Consolas, monospace;
      --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; padding: 24px 16px; }
    .container { max-width: 760px; margin: 0 auto; }
    header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    header h1 { font-size: 1.25rem; font-weight: 700; }
    header h1 span { color: var(--primary); }
    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 12px;
      font-size: 0.75rem; font-weight: 600;
    }
    .badge-ok { background: rgba(34,197,94,.15); color: var(--success); }
    .badge-err { background: rgba(239,68,68,.1); color: var(--error); }
    .badge-loading { background: rgba(59,130,246,.1); color: var(--primary); }
    .meta-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 16px 20px; margin-bottom: 20px;
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
    }
    @media (max-width: 500px) { .meta-card { grid-template-columns: 1fr; } }
    .meta-item label { font-size: 0.6875rem; text-transform: uppercase; letter-spacing: .4px; color: var(--text-muted); font-weight: 600; display: block; margin-bottom: 4px; }
    .meta-item span { font-size: 0.9375rem; font-weight: 600; }
    .meta-item .sub { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }
    .rule-list { display: flex; flex-direction: column; gap: 8px; }
    .rule-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 16px;
      display: flex; align-items: flex-start; gap: 12px;
    }
    .rule-priority {
      min-width: 32px; height: 32px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 700;
      background: rgba(59,130,246,.15); color: var(--primary);
      flex-shrink: 0;
    }
    .rule-info { flex: 1; min-width: 0; }
    .rule-id { font-size: 0.875rem; font-weight: 700; font-family: var(--mono); overflow-wrap: break-word; }
    .rule-desc { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }
    .rule-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    .tag {
      padding: 1px 7px; border-radius: 10px; font-size: 0.6875rem; font-weight: 500;
      background: var(--surface-alt); color: var(--text-muted); border: 1px solid var(--border);
    }
    .tag.scope-global { background: rgba(139,92,246,.12); color: #a78bfa; border-color: rgba(139,92,246,.3); }
    .tag.scope-daily  { background: rgba(245,158,11,.12); color: #fbbf24; border-color: rgba(245,158,11,.3); }
    .tag.scope-trip   { background: rgba(34,197,94,.12);  color: #4ade80; border-color: rgba(34,197,94,.3); }
    .empty-state { text-align: center; padding: 48px 16px; color: var(--text-muted); }
    .status-bar {
      font-size: 0.75rem; color: var(--text-muted);
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 16px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); flex-shrink: 0; }
    .dot.error { background: var(--error); }
    .dot.loading { background: var(--primary); animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    a { color: var(--primary); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .footer { margin-top: 32px; padding-top: 16px; border-top: 1px solid var(--border); font-size: 0.75rem; color: var(--text-muted); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1><span>AI Engine</span> Published Rules</h1>
      <span id="status-badge" class="badge badge-loading">Loading...</span>
    </header>

    <div class="status-bar">
      <span class="dot loading" id="status-dot"></span>
      <span id="status-text">Fetching latest rules...</span>
      <button id="refresh-btn" onclick="load()" style="margin-left:8px;background:none;border:1px solid var(--border);color:var(--text-muted);padding:3px 10px;border-radius:6px;cursor:pointer;font-size:0.75rem;font-family:var(--sans)">Refresh</button>
    </div>

    <div class="meta-card" id="meta-card" style="display:none">
      <div class="meta-item">
        <label>Published</label>
        <span id="meta-published">—</span>
        <div class="sub" id="meta-published-rel"></div>
      </div>
      <div class="meta-item">
        <label>Rules</label>
        <span id="meta-count">—</span>
        <div class="sub" id="meta-description"></div>
      </div>
    </div>

    <div id="rule-list" class="rule-list"></div>
    <div id="empty-state" class="empty-state" style="display:none">No rules published yet.</div>

    <!-- Raw JSON toggle -->
    <div style="margin-top:20px">
      <button id="toggle-json-btn" onclick="toggleRawJson()"
        style="background:none;border:1px solid var(--border);color:var(--text-muted);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:0.75rem;font-family:var(--sans)">
        Show Raw JSON ▾
      </button>
      <button id="copy-json-btn" onclick="copyRawJson()" style="display:none;
        background:none;border:1px solid var(--border);color:var(--text-muted);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:0.75rem;font-family:var(--sans);margin-left:6px">
        Copy JSON
      </button>
      <pre id="raw-json-block" style="display:none;margin-top:10px;background:var(--surface);border:1px solid var(--border);
        border-radius:8px;padding:16px;font-family:var(--mono);font-size:0.75rem;line-height:1.6;
        overflow-x:auto;white-space:pre-wrap;word-wrap:break-word;max-height:500px;overflow-y:auto;color:var(--text)"></pre>
    </div>

    <div class="footer">
      <span><a href="index.html">Open Rule Builder</a></span>
      <span id="footer-url"></span>
    </div>
  </div>

  <script>
    // Use the GitHub Contents API instead of raw.githubusercontent.com.
    // raw.githubusercontent.com is served by Fastly CDN with ~5 min cache, so it
    // shows stale content immediately after a publish. The Contents API always
    // returns the latest committed version with no CDN layer.
    const CONTENTS_URL = 'https://api.github.com/repos/Maartinsh/AIRuleBuilderWeb/contents/rules/latest.json';
    const RAW_URL = 'https://raw.githubusercontent.com/Maartinsh/AIRuleBuilderWeb/main/rules/latest.json';
    let _lastRawJson = null;

    function toggleRawJson() {
      const block = document.getElementById('raw-json-block');
      const btn = document.getElementById('toggle-json-btn');
      const copyBtn = document.getElementById('copy-json-btn');
      const showing = block.style.display !== 'none';
      block.style.display = showing ? 'none' : 'block';
      copyBtn.style.display = showing ? 'none' : 'inline-block';
      btn.textContent = showing ? 'Show Raw JSON ▾' : 'Hide Raw JSON ▴';
    }

    function copyRawJson() {
      if (!_lastRawJson) return;
      navigator.clipboard.writeText(_lastRawJson).then(() => {
        const btn = document.getElementById('copy-json-btn');
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy JSON', 2000);
      });
    }

    function setStatus(type, text) {
      const dot = document.getElementById('status-dot');
      const badge = document.getElementById('status-badge');
      const statusText = document.getElementById('status-text');
      dot.className = 'dot ' + (type === 'ok' ? '' : type);
      badge.className = 'badge ' + (type === 'ok' ? 'badge-ok' : type === 'error' ? 'badge-err' : 'badge-loading');
      badge.textContent = type === 'ok' ? 'Live' : type === 'error' ? 'Error' : 'Loading...';
      statusText.textContent = text;
    }

    function relativeTime(isoString) {
      const diff = Date.now() - new Date(isoString).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1)   return 'just now';
      if (mins < 60)  return `${mins}m ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24)   return `${hrs}h ago`;
      return `${Math.floor(hrs / 24)}d ago`;
    }

    function renderRules(rules) {
      const list = document.getElementById('rule-list');
      const empty = document.getElementById('empty-state');
      list.innerHTML = '';
      if (!rules || rules.length === 0) { empty.style.display = ''; return; }
      empty.style.display = 'none';
      rules.forEach(rule => {
        const scopeClass = rule.sessionScope ? `scope-${rule.sessionScope}` : '';
        const tags = [
          rule.sessionScope ? `<span class="tag ${scopeClass}">${rule.sessionScope}</span>` : '',
          rule.priority != null ? `<span class="tag">priority ${rule.priority}</span>` : '',
          rule.throttle?.cooldownMinutes ? `<span class="tag">cooldown ${rule.throttle.cooldownMinutes}m</span>` : ''
        ].filter(Boolean).join('');
        list.insertAdjacentHTML('beforeend', `
          <div class="rule-card">
            <div class="rule-priority">${rule.priority ?? '—'}</div>
            <div class="rule-info">
              <div class="rule-id">${rule.id || '(no id)'}</div>
              ${rule.description ? `<div class="rule-desc">${rule.description}</div>` : ''}
              ${tags ? `<div class="rule-tags">${tags}</div>` : ''}
            </div>
          </div>`);
      });
    }

    async function load() {
      setStatus('loading', 'Fetching latest rules...');
      const btn = document.getElementById('refresh-btn');
      if (btn) btn.disabled = true;
      try {
        const res = await fetch(CONTENTS_URL, { headers: { Accept: 'application/vnd.github+json' } });
        if (res.status === 404) {
          setStatus('error', 'Nothing published yet — use the Rule Builder to publish.');
          document.getElementById('meta-card').style.display = 'none';
          document.getElementById('rule-list').innerHTML = '';
          document.getElementById('empty-state').style.display = '';
          return;
        }
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const json = await res.json();
        // Contents API returns base64-encoded file content
        const text = decodeURIComponent(escape(atob(json.content.replace(/\n/g, ''))));
        _lastRawJson = text;
        document.getElementById('raw-json-block').textContent = JSON.stringify(JSON.parse(text), null, 2);
        const data = JSON.parse(text);

        const meta = data._meta || {};
        const rules = Array.isArray(data) ? data : (data.rules || []);
        const publishedAt = meta.publishedAt || null;

        // Meta card
        document.getElementById('meta-card').style.display = '';
        document.getElementById('meta-count').textContent = rules.length + ' rule' + (rules.length !== 1 ? 's' : '');
        if (publishedAt) {
          const d = new Date(publishedAt);
          document.getElementById('meta-published').textContent = d.toLocaleString('en-GB', { timeZone: 'Europe/Riga', day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }) + ' (Riga)';
          document.getElementById('meta-published-rel').textContent = relativeTime(publishedAt);
        }
        if (meta.description) document.getElementById('meta-description').textContent = meta.description;

        renderRules(rules);
        setStatus('ok', `Last fetched ${new Date().toLocaleTimeString('en-GB', { timeZone: 'Europe/Riga', hour: '2-digit', minute: '2-digit', second: '2-digit' })} Riga`);
      } catch (e) {
        setStatus('error', 'Failed to load: ' + e.message);
      } finally {
        if (btn) btn.disabled = false;
      }
    }

    document.getElementById('footer-url').textContent = RAW_URL;
    load();
  </script>
</body>
</html>
